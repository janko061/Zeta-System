name: Check BML compilation

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install bml2latex
        run: pip install bridge-markup --upgrade

      - name: Compile BML file
        run: bml2latex -o Sistem.tex BML/SistemBML.txt
